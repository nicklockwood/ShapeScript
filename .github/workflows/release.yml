name: Build Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build'
        required: true

jobs:
  macos:
    name: Build and notarize macOS Viewer app
    runs-on: macos-15

    steps:
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Import Code Signing Certificate
        run: |
          if [ -z "${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}" ]; then
            echo "ERROR: DEVELOPER_ID_CERTIFICATE_BASE64 secret is empty or not set"
            exit 1
          fi
          if [ -z "${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}" ]; then
            echo "ERROR: DEVELOPER_ID_CERTIFICATE_PASSWORD secret is empty or not set"
            exit 1
          fi

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

          echo "${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          rm certificate.p12

      - name: Archive ShapeScript Viewer
        run: |
          ARCHIVE_PATH="build/ShapeScriptViewer.xcarchive"
          xcodebuild \
            -project ShapeScript.xcodeproj \
            -scheme "Viewer (Mac)" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="8VQKF583ED" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

      - name: Copy archived app
        id: export-app
        run: |
          ARCHIVE_PATH="build/ShapeScriptViewer.xcarchive"
          EXPORT_PATH="build/Export"
          mkdir -p "$EXPORT_PATH"

          cp -R "$ARCHIVE_PATH/Products/Applications/ShapeScript Viewer.app" "$EXPORT_PATH/"

          APP_PATH="$EXPORT_PATH/ShapeScript Viewer.app"
          echo "app-path=$APP_PATH" >> $GITHUB_OUTPUT

          codesign --verify --deep --strict "$APP_PATH"
          spctl -a -v "$APP_PATH"

      - name: Notarize app
        uses: lando/notarize-action@v2
        with:
          product-path: ${{ steps.export-app.outputs.app-path }}
          appstore-connect-username: ${{ secrets.NOTARIZATION_USERNAME }}
          appstore-connect-password: ${{ secrets.NOTARIZATION_PASSWORD }}
          appstore-connect-team-id: 8VQKF583ED
          primary-bundle-id: com.charcoaldesign.ShapeScriptViewer
          verbose: true

      - name: Staple notarization
        run: xcrun stapler staple "${{ steps.export-app.outputs.app-path }}"

      - name: Get notarization logs
        if: failure()
        run: |
          xcrun notarytool history --team-id 8VQKF583ED --apple-id "${{ secrets.NOTARIZATION_USERNAME }}" --password "${{ secrets.NOTARIZATION_PASSWORD }}"
          REQUEST_UUID=$(xcrun notarytool history --team-id 8VQKF583ED --apple-id "${{ secrets.NOTARIZATION_USERNAME }}" --password "${{ secrets.NOTARIZATION_PASSWORD }}" | grep -E "id:\s*[a-f0-9-]{36}" | head -1 | sed 's/.*id: //')
          if [ -n "$REQUEST_UUID" ]; then
            xcrun notarytool log "$REQUEST_UUID" --team-id 8VQKF583ED --apple-id "${{ secrets.NOTARIZATION_USERNAME }}" --password "${{ secrets.NOTARIZATION_PASSWORD }}"
          fi

      - name: Zip app
        run: |
          cd "$(dirname "${{ steps.export-app.outputs.app-path }}")"
          zip -r --symlinks ShapeScript.Viewer.app.zip "ShapeScript Viewer.app"
          echo "ZIP_PATH=$(pwd)/ShapeScript.Viewer.app.zip" >> $GITHUB_ENV

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: shapescript_viewer_macos
          path: ${{ env.ZIP_PATH }}
          retention-days: 5

  linux:
    name: Build Linux command line app
    runs-on: ubuntu-latest
    container:
      image: swift:5.10-focal
      options: --cap-add=SYS_PTRACE --security-opt seccomp=unconfined --security-opt apparmor=unconfined

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Build release binary
        run: |
          swift build --configuration release --static-swift-stdlib
          BIN_PATH="$(swift build --configuration release --show-bin-path)/shapescript"
          strip "$BIN_PATH"
          mkdir -p release
          cp "$BIN_PATH" release/shapescript
          chmod +x release/shapescript

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: shapescript_linux
          path: release/shapescript
          retention-days: 5

  upload:
    name: Upload release artifacts
    runs-on: ubuntu-latest
    needs: [macos, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: downloaded_artifacts

      - name: Display downloaded artifacts
        run: ls -R downloaded_artifacts

      - name: Zip Linux binary
        run: |
          chmod +x downloaded_artifacts/shapescript_linux/shapescript
          zip -j shapescript_linux.zip downloaded_artifacts/shapescript_linux/shapescript

      - name: Get release ID
        id: get-release-id
        run: |
          if [ -n "${{ github.event.release.id }}" ]; then
            echo "release-id=${{ github.event.release.id }}" >> $GITHUB_OUTPUT
          else
            RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ inputs.tag }} --jq '.id')
            echo "release-id=$RELEASE_ID" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: skx/github-action-publish-binaries@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ steps.get-release-id.outputs.release-id }}
          args: 'downloaded_artifacts/shapescript_viewer_macos/ShapeScript.Viewer.app.zip shapescript_linux.zip'
